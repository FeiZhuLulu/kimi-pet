<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kimi Pet Preview</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1e1e1e;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #pet-container {
      width: 256px;
      height: 256px;
      margin-bottom: 24px;
    }
    #pet-sprite {
      width: 100%;
      height: 100%;
      background-repeat: no-repeat;
      image-rendering: auto;
    }
    #state-text {
      font-size: 18px;
      margin-bottom: 16px;
      text-transform: capitalize;
    }
    #controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 600px;
    }
    button {
      padding: 8px 16px;
      border: 1px solid #555;
      background: #2d2d2d;
      color: #fff;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #3d3d3d;
    }
    #status {
      margin-top: 16px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>
  <div id="pet-container">
    <div id="pet-sprite"></div>
  </div>
  <div id="state-text">idle</div>
  <div id="controls">
    <button data-state="idle">idle</button>
    <button data-state="thinking">thinking</button>
    <button data-state="tool_use">tool_use</button>
    <button data-state="editing">editing</button>
    <button data-state="terminal">terminal</button>
    <button data-state="waiting_approval">waiting</button>
    <button data-state="success">success</button>
    <button data-state="error">error</button>
  </div>
  <div id="status">connecting...</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
